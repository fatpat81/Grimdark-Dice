        body {
            background-color: var(--bg-color);
            color: var(--ghost-green);
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        .fog-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            pointer-events: none;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .fog-layer {
            position: absolute;
            width: 150vw;
            height: 150vw;
            background: radial-gradient(circle, var(--fog-color-1) 0%, transparent 60%);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.6;
            animation: drift 20s infinite alternate ease-in-out;
        }

        .fog-layer:nth-child(2) {
            width: 200vw;
            height: 100vw;
            background: radial-gradient(circle, var(--fog-color-2) 0%, transparent 60%);
            animation: drift-rev 25s infinite alternate ease-in-out;
            animation-delay: -5s;
        }

        .fog-layer:nth-child(3) {
            width: 100vw;
            height: 150vw;
            background: radial-gradient(circle, var(--fog-color-3) 0%, transparent 70%);
            animation: drift-vertical 30s infinite alternate ease-in-out;
            animation-delay: -10s;
        }

        @keyframes drift {
            0% { transform: translate(-20%, -10%); }
            100% { transform: translate(20%, 10%); }
        }

        @keyframes drift-rev {
            0% { transform: translate(20%, 15%); }
            100% { transform: translate(-20%, -15%); }
        }

        @keyframes drift-vertical {
            0% { transform: translate(-10%, 20%); }
            100% { transform: translate(10%, -20%); }
        }

        .container {
            background: var(--panel-bg);
            border: 2px solid var(--border-neon);
            box-shadow: 0 0 30px var(--ghost-green-glow), inset 0 0 20px var(--ghost-green-glow);
            border-radius: 10px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            margin: auto;
            position: relative;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: #fff;
            text-shadow: 0 0 10px var(--ghost-green), 0 0 20px var(--ghost-green);
            margin-bottom: 30px;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 1.1rem;
            color: #aaffdd;
            text-shadow: 0 0 5px var(--ghost-green-glow);
            font-family: 'Cinzel', serif;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--ghost-green);
            color: #fff;
            font-size: 1.2rem;
            font-family: 'Share Tech Mono', monospace;
            border-radius: 5px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="number"]:focus {
            box-shadow: 0 0 15px var(--ghost-green-glow);
            border-color: #fff;
        }

        button {
            background: rgba(0, 255, 136, 0.1);
            color: #fff;
            border: 2px solid var(--ghost-green);
            padding: 15px 30px;
            font-size: 1.2rem;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px var(--ghost-green-glow) inset;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            background: var(--ghost-green);
            color: #000;
            box-shadow: 0 0 30px var(--ghost-green), 0 0 10px var(--ghost-green) inset;
        }

        .dice-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: flex-start;
            gap: 15px;
            margin: 20px 0;
            min-height: 60px;
            max-height: 35vh;
            overflow-y: auto;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 5px;
            border: 1px solid rgba(0, 255, 136, 0.1);
        }
        
        .dice-container::-webkit-scrollbar {
            width: 8px;
        }
        .dice-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
        }
        .dice-container::-webkit-scrollbar-thumb {
            background: var(--ghost-green);
            border-radius: 4px;
        }

        .die {
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 8px;
            color: var(--dice-text);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            animation: roll-in 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
            opacity: 0;
            transform: translateY(-20px) rotate(-180deg);
        }

        .die-symbol {
            width: 70%;
            height: 70%;
            background-color: currentColor;
            -webkit-mask-image: var(--faction-symbol);
            mask-image: var(--faction-symbol);
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
        }

        .faction-watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vw;
            max-width: 800px;
            max-height: 800px;
            z-index: 0;
            opacity: 0.45;
            background-color: var(--ghost-green);
            -webkit-mask-image: var(--faction-symbol);
            mask-image: var(--faction-symbol);
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
            pointer-events: none;
            transition: all 0.5s ease;
        }

        @keyframes roll-in {
            to {
                opacity: 1;
                transform: translateY(0) rotate(0deg);
            }
        }

        .die.success {
            background: linear-gradient(135deg, var(--dice-grad-light), var(--dice-grad-dark));
            border: 2px solid var(--ghost-green);
            box-shadow: 0 0 15px var(--ghost-green-glow);
        }

        .die.devastating {
            background: linear-gradient(135deg, #00d2ff, #0077b3);
            border: 2px solid #00d2ff;
            box-shadow: 0 0 15px #00d2ffaa;
            color: #fff;
        }

        .die.fail {
            background: linear-gradient(135deg, #b30000, #660000);
            border: 2px solid #ff3333;
            box-shadow: 0 0 15px var(--fail-red-glow);
        }

        .checkbox-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0 25px 0;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 1.1rem;
            color: #aaffdd;
            text-shadow: 0 0 5px var(--ghost-green-glow);
            font-family: 'Cinzel', serif;
            margin: 0;
        }

        .checkbox-group input[type="checkbox"] {
            appearance: none;
            width: 22px;
            height: 22px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--ghost-green);
            border-radius: 4px;
            margin-right: 10px;
            position: relative;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
        }

        .checkbox-group input[type="checkbox"]:checked {
            background: var(--ghost-green);
            box-shadow: 0 0 10px var(--ghost-green-glow);
        }

        .checkbox-group input[type="checkbox"]:checked::after {
            content: '✓';
            color: #000;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            font-weight: bold;
        }

        .summary-text {
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 0 0 10px var(--ghost-green);
            margin: 20px 0;
            font-family: 'Cinzel', serif;
            color: #fff;
        }

        #wound-section {
            display: none;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px dashed var(--ghost-green);
            animation: fade-in 1s ease forwards;
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .warp-particle {
            position: absolute;
            background: var(--fog-light-green);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.6;
            animation: float 4s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 0.6; }
            50% { transform: translateY(-50px) scale(1.5); opacity: 0; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="fog-container">
        <div class="faction-watermark"></div>
        <div class="fog-layer"></div>
        <div class="fog-layer"></div>
        <div class="fog-layer"></div>
    </div>
    
    <div style="position: absolute; top: 15px; left: 15px; z-index: 10;">
        <label for="faction-select" style="font-size: 0.9rem; margin-bottom: 2px;">Faction</label>
        <select id="faction-select" style="display: block; padding: 5px; background: rgba(0,0,0,0.7); border: 1px solid var(--ghost-green); color: var(--ghost-green); font-family: 'Share Tech Mono', monospace; border-radius: 3px; outline: none; cursor: pointer;">
            <optgroup label="Imperium (Space Marines)">
                <option value="ultramarines">Ultramarines</option>
                <option value="bloodangels">Blood Angels</option>
                <option value="darkangels">Dark Angels</option>
                <option value="spacewolves">Space Wolves</option>
                <option value="blacktemplars">Black Templars</option>
                <option value="imperialfists">Imperial Fists</option>
                <option value="salamanders">Salamanders</option>
            </optgroup>
            <optgroup label="Imperium (Other)">
                <option value="astramilitarum">Astra Militarum</option>
                <option value="custodes">Adeptus Custodes</option>
                <option value="sororitas">Adepta Sororitas</option>
                <option value="admech">Adeptus Mechanicus</option>
            </optgroup>
            <optgroup label="Chaos (Legions)">
                <option value="blacklegion">Black Legion</option>
                <option value="worldeaters">World Eaters</option>
                <option value="deathguard">Death Guard</option>
                <option value="thousandsons">Thousand Sons</option>
                <option value="ironwarriors">Iron Warriors</option>
                <option value="nightlords">Night Lords</option>
                <option value="alphalegion">Alpha Legion</option>
            </optgroup>
            <optgroup label="Xenos">
                <option value="necrons">Necrons (Szarekhan)</option>
                <option value="orks">Orks (Goffs)</option>
                <option value="tyranids">Tyranids (Leviathan)</option>
                <option value="tau">T'au Empire (Vior'la)</option>
                <option value="aeldari-ulthwe">Aeldari (Ulthwé)</option>
                <option value="aeldari-saimhann">Aeldari (Saim-Hann)</option>
                <option value="drukhari">Drukhari</option>
                <option value="genestealers">Genestealer Cults</option>
                <option value="votann">Leagues of Votann</option>
            </optgroup>
        </select>
    </div>

    <div class="container" id="app-container">
        <h1>GrimDark Dice</h1>
        
        <!-- SECTION 1: INIT -->
        <div id="section-1">
            <div class="form-group">
                <label for="attacks">Number of Attacks</label>
                <input type="number" id="attacks" value="12" min="1">
            </div>
            <div class="form-group">
                <label for="bs">Ballistic Skill (BS+) [2-6]</label>
                <input type="number" id="bs" value="3" min="2" max="6">
            </div>
            <div class="form-group">
                <label for="strength">Weapon Strength (STR)</label>
                <input type="number" id="strength" value="5" min="1">
            </div>
            
            <div class="checkbox-group" style="margin-bottom: 5px;">
                <label>
                    <input type="checkbox" id="lethal-hits"> Lethal Hits
                </label>
            </div>
            
            <div class="checkbox-group" style="margin-top: 5px;">
                <span style="color: #aaffdd; font-family: 'Cinzel', serif; font-size: 1.1rem; text-shadow: 0 0 5px var(--ghost-green-glow); margin-right: 10px; align-self: center;">Sustained Hits:</span>
                <label>
                    <input type="checkbox" id="sustained-hits-1" onchange="if(this.checked) document.getElementById('sustained-hits-2').checked = false;"> (1)
                </label>
                <label>
                    <input type="checkbox" id="sustained-hits-2" onchange="if(this.checked) document.getElementById('sustained-hits-1').checked = false;"> (2)
                </label>
            </div>

            <button id="btn-roll-hits">Roll for Hits</button>
        </div>

        <!-- SECTION 2: HITS & TOUGHNESS -->
        <div id="section-2" style="display: none; animation: fade-in 0.5s ease forwards;">
            <h2 style="font-family: 'Cinzel', serif; color: var(--ghost-green); margin-bottom: 15px; font-size: 2rem;">Hit Results</h2>
            <div class="dice-container" id="hit-dice-container"></div>
            <div class="summary-text" id="hit-summary"></div>
            
            <button id="btn-reroll-hits" style="margin-top: 10px; background: rgba(255, 165, 0, 0.2); border-color: #ffa500; text-shadow: 0 0 5px #ffa500; display: none;">Reroll Failed Hits</button>
            
            <hr style="border: 0; border-top: 1px dashed var(--ghost-green); margin: 25px 0; opacity: 0.5;">
            
            <div class="form-group" style="margin-bottom: 20px;">
                <label for="dev-wounds">Devastating Wounds</label>
                <select id="dev-wounds" style="width: 100%; padding: 10px; background: rgba(0, 0, 0, 0.6); border: 1px solid var(--ghost-green); color: #fff; font-size: 1.1rem; font-family: 'Share Tech Mono', monospace; border-radius: 5px; outline: none; transition: all 0.3s ease; appearance: none; cursor: pointer;">
                    <option value="7">None</option>
                    <option value="6">Critical Wounds (6+)</option>
                    <option value="5">Critical Wounds (5+)</option>
                    <option value="4">Critical Wounds (4+)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="toughness">Target Toughness (T)</label>
                <input type="number" id="toughness" value="4" min="1">
            </div>
            <button id="btn-roll-wounds">Roll for Wounds</button>
        </div>

        <!-- SECTION 3: WOUNDS & RESTART -->
        <div id="section-3" style="display: none; animation: fade-in 0.5s ease forwards;">
            <h2 style="font-family: 'Cinzel', serif; color: var(--ghost-green); margin-bottom: 15px; font-size: 2rem;">Wound Results</h2>
            <div class="summary-text" id="wound-target-text" style="font-size: 1.2rem; margin-bottom:10px;"></div>
            <div class="dice-container" id="wound-dice-container"></div>
            <div class="summary-text" id="wound-summary"></div>
            
            <button id="btn-reroll-wounds" style="margin-top: 10px; background: rgba(255, 165, 0, 0.2); border-color: #ffa500; text-shadow: 0 0 5px #ffa500; display: none;">Reroll Failed Wounds</button>
            <button id="btn-restart" style="margin-top: 25px; background: rgba(0, 255, 136, 0.2);">Restart</button>
        </div>
    </div>

    <script>
        // State
        let currentHits = 0;
        let autoWounds = 0;
        let storedSTR = 0;
        let failedHitCount = 0;
        let failedWoundCount = 0;
        let woundsAllocated = 0;
        let devWoundsCount = 0;
        let storedWoundTarget = 0;

        const elAttacks = document.getElementById('attacks');
        const elBS = document.getElementById('bs');
        const elSTR = document.getElementById('strength');
        const btnHits = document.getElementById('btn-roll-hits');
        const btnRerollHits = document.getElementById('btn-reroll-hits');
        const hitDiceContainer = document.getElementById('hit-dice-container');
        const hitSummary = document.getElementById('hit-summary');
        
        const section1 = document.getElementById('section-1');
        const section2 = document.getElementById('section-2');
        const section3 = document.getElementById('section-3');
        const elToughness = document.getElementById('toughness');
        const elDevWounds = document.getElementById('dev-wounds');
        const btnWounds = document.getElementById('btn-roll-wounds');
        const btnRerollWounds = document.getElementById('btn-reroll-wounds');
        const woundTargetText = document.getElementById('wound-target-text');
        const woundDiceContainer = document.getElementById('wound-dice-container');
        const woundSummary = document.getElementById('wound-summary');
        const btnRestart = document.getElementById('btn-restart');

        // Helper: Roll D6
        function rollD6() {
            return Math.floor(Math.random() * 6) + 1;
        }

        // Helper: Render Dice
        function renderDice(container, rolls, successThreshold, devThreshold = 7, append = false) {
            if (!append) container.innerHTML = '';
            rolls.forEach((roll, index) => {
                const die = document.createElement('div');
                die.classList.add('die');
                if (roll >= devThreshold) {
                    die.classList.add('devastating');
                } else if (roll >= successThreshold) {
                    die.classList.add('success');
                } else {
                    die.classList.add('fail');
                }
                
                if (roll === 6) {
                    const symbol = document.createElement('div');
                    symbol.classList.add('die-symbol');
                    die.appendChild(symbol);
                } else {
                    die.textContent = roll;
                }
                
                die.style.animationDelay = `${index * 0.02}s`;
                container.appendChild(die);
            });
        }

        // Logic: Wound Target Calculation
        function getWoundTarget(str, t) {
            if (str >= 2 * t) return 2;
            if (str > t) return 3;
            if (str === t) return 4;
            if (str <= t / 2) return 6;
            return 5; // str < t but not half
        }

        // Event: Hit Roll
        btnHits.addEventListener('click', () => {
            const attacks = parseInt(elAttacks.value) || 1;
            const bs = parseInt(elBS.value) || 2;
            storedSTR = parseInt(elSTR.value) || 1;
            
            const lethalEnabled = document.getElementById('lethal-hits').checked;
            const sustained1Enabled = document.getElementById('sustained-hits-1').checked;
            const sustained2Enabled = document.getElementById('sustained-hits-2').checked;
            
            let sustainedLevel = 0;
            if (sustained1Enabled) sustainedLevel = 1;
            if (sustained2Enabled) sustainedLevel = 2;

            const rolls = [];
            currentHits = 0;
            autoWounds = 0;
            failedHitCount = 0;

            for(let i=0; i<attacks; i++) {
                const r = rollD6();
                rolls.push(r);
                
                if (r === 6) {
                    if (lethalEnabled) {
                        autoWounds++;
                    } else {
                        currentHits++;
                    }
                    if (sustainedLevel > 0) {
                        currentHits += sustainedLevel; // Extra hits from sustained hits
                    }
                } else if (r >= bs) {
                    currentHits++;
                } else {
                    failedHitCount++;
                }
            }

            renderDice(hitDiceContainer, rolls, bs);
            
            hitSummary.innerHTML = `Hits to Roll: ${currentHits}` + 
                (autoWounds > 0 ? `<br><span style="color:var(--border-neon); font-size:1.4rem;">Auto-Wounds: ${autoWounds}</span>` : '');

            btnRerollHits.style.display = failedHitCount > 0 ? 'inline-block' : 'none';

            section1.style.display = 'none';
            section2.style.display = 'block';
            
            spawnParticles();
        });

        // Event: Reroll Failed Hits
        btnRerollHits.addEventListener('click', () => {
             btnRerollHits.style.display = 'none'; // Only allow reroll once
             
             // Remove all failed dice visually
             hitDiceContainer.querySelectorAll('.fail').forEach(el => el.remove());
             
             const rerollCount = failedHitCount;
             failedHitCount = 0;
             const bs = parseInt(elBS.value) || 2;
             
             const lethalEnabled = document.getElementById('lethal-hits').checked;
             const sustained1Enabled = document.getElementById('sustained-hits-1').checked;
             const sustained2Enabled = document.getElementById('sustained-hits-2').checked;
             let sustainedLevel = 0;
             if (sustained1Enabled) sustainedLevel = 1;
             if (sustained2Enabled) sustainedLevel = 2;
             
             const newRolls = [];
             for (let i = 0; i < rerollCount; i++) {
                 const r = rollD6();
                 newRolls.push(r);
                 if (r === 6) {
                     if (lethalEnabled) autoWounds++;
                     else currentHits++;
                     if (sustainedLevel > 0) currentHits += sustainedLevel;
                 } else if (r >= bs) {
                     currentHits++;
                 } else {
                     failedHitCount++;
                 }
             }
             
             renderDice(hitDiceContainer, newRolls, bs, 7, true);
             
             hitSummary.innerHTML = `Hits to Roll: ${currentHits}` + 
                 (autoWounds > 0 ? `<br><span style="color:var(--border-neon); font-size:1.4rem;">Auto-Wounds: ${autoWounds}</span>` : '');
             
             spawnParticles();
        });

        // Event: Wound Roll
        btnWounds.addEventListener('click', () => {
            if (currentHits <= 0 && autoWounds <= 0) return;

            const t = parseInt(elToughness.value) || 1;
            storedWoundTarget = getWoundTarget(storedSTR, t);
            const devThreshold = parseInt(elDevWounds.value) || 7;

            woundTargetText.innerText = `Target to Wound: ${storedWoundTarget}+`;

            const rolls = [];
            woundsAllocated = autoWounds;
            devWoundsCount = 0;
            failedWoundCount = 0;

            for(let i=0; i<currentHits; i++) {
                const r = rollD6();
                rolls.push(r);
                if (r >= devThreshold) {
                    woundsAllocated++;
                    devWoundsCount++;
                } else if (r >= storedWoundTarget) {
                    woundsAllocated++;
                } else {
                    failedWoundCount++;
                }
            }

            renderDice(woundDiceContainer, rolls, storedWoundTarget, devThreshold);
            updateWoundSummary();
            
            btnRerollWounds.style.display = failedWoundCount > 0 ? 'inline-block' : 'none';
            
            section2.style.display = 'none';
            section3.style.display = 'block';
            
            spawnParticles();
        });

        // Event: Reroll Failed Wounds
        btnRerollWounds.addEventListener('click', () => {
             btnRerollWounds.style.display = 'none';
             
             woundDiceContainer.querySelectorAll('.fail').forEach(el => el.remove());
             
             const devThreshold = parseInt(elDevWounds.value) || 7;
             const rerollCount = failedWoundCount;
             failedWoundCount = 0;
             
             const newRolls = [];
             for (let i = 0; i < rerollCount; i++) {
                 const r = rollD6();
                 newRolls.push(r);
                 if (r >= devThreshold) {
                     woundsAllocated++;
                     devWoundsCount++;
                 } else if (r >= storedWoundTarget) {
                     woundsAllocated++;
                 } else {
                     failedWoundCount++; 
                 }
             }
             
             renderDice(woundDiceContainer, newRolls, storedWoundTarget, devThreshold, true);
             updateWoundSummary();
             spawnParticles();
        });

        function updateWoundSummary() {
            let woundsToSave = woundsAllocated - devWoundsCount;
            let summaryHtml = '';
            
            if (woundsToSave > 0 || devWoundsCount === 0) {
                summaryHtml += `<div style="font-size: 1.8rem; margin-bottom: 5px;">${woundsToSave} WOUNDS TO SAVE</div>`;
            }
            if (devWoundsCount > 0) {
                summaryHtml += `<div style="color:#00d2ff; font-size: 1.8rem; text-shadow: 0 0 10px #00d2ffaa; margin-top: 5px;">${devWoundsCount} DEVASTATING WOUNDS</div>`;
            }
            
            let subtext = [];
            if (autoWounds > 0) subtext.push(`${autoWounds} Auto-Wounds included`);
            
            if (subtext.length > 0) {
                summaryHtml += `<div style="margin-top: 10px;"><span style="font-size:1.2rem; color:#aaa; font-family:'Share Tech Mono', monospace;">(${subtext.join(', ')})</span></div>`;
            }
            woundSummary.innerHTML = summaryHtml;
        }
        const factionLogos = {
            'ultramarines': 'human_imperium/astartes_legion/ultramarines.svg',
            'bloodangels': 'human_imperium/astartes_legion/blood-angels.svg',
            'darkangels': 'human_imperium/astartes_legion/dark-angels.svg',
            'spacewolves': 'human_imperium/astartes_legion/space-wolves.svg',
            'blacktemplars': 'human_imperium/astartes_chapters/black-templars.svg',
            'imperialfists': 'human_imperium/astartes_legion/imperial-fists.svg',
            'salamanders': 'human_imperium/astartes_legion/salamanders.svg',
            'astramilitarum': 'human_imperium/astra-militarum.svg',
            'custodes': 'human_imperium/adeptus-custodes.svg',
            'sororitas': 'human_imperium/sisters-of-battle.svg',
            'admech': 'human_imperium/adeptus-mechanicus.svg',
            'blacklegion': 'chaos/legions/black-legion.svg',
            'worldeaters': 'chaos/legions/world-eaters-1.svg',
            'deathguard': 'chaos/legions/death-guard.svg',
            'thousandsons': 'chaos/legions/thousand-sons.svg',
            'ironwarriors': 'chaos/legions/iron-warriors.svg',
            'nightlords': 'chaos/legions/night-lords.svg',
            'alphalegion': 'chaos/legions/alpha-legion-1.svg',
            'chaos': 'chaos/chaos-star-01.svg',
            'necrons': 'xenos/necrons/szarekhan.svg',
            'orks': 'xenos/orks/goffs-clan.svg',
            'tyranids': 'xenos/tyranids.svg',
            'tau': 'xenos/tau_empire/viorla-sept.svg',
            'aeldari-ulthwe': 'xenos/eldar/craftworld-ulthwe.svg',
            'aeldari-saimhann': 'xenos/eldar/craftworld-saim-hann.svg',
            'drukhari': 'xenos/durhkari/dark-eldar.svg',
            'genestealers': 'xenos/genestealer_cult/genestealer-cults.svg',
            'votann': 'xenos/leagues-of-votann.svg'
        };
        const baseUrl = 'https://cdn.jsdelivr.net/gh/Certseeds/wh40k-icon@master/src/svgs/';

        function updateFactionSymbol(faction) {
            const logoPath = factionLogos[faction] || factionLogos['necrons'];
            document.documentElement.style.setProperty('--faction-symbol', `url('${baseUrl}${logoPath}')`);
        }
        
        // Event: Faction Change
        document.getElementById('faction-select').addEventListener('change', (e) => {
            const faction = e.target.value;
            document.body.className = faction === 'necrons' ? '' : `faction-${faction}`;
            updateFactionSymbol(faction);
        });
        
        // Initialize symbol on load based on current dropdown value
        updateFactionSymbol(document.getElementById('faction-select').value || 'necrons');
        
        // Event: Restart
        btnRestart.addEventListener('click', () => {
            section3.style.display = 'none';
            section1.style.display = 'block';
            hitDiceContainer.innerHTML = '';
            woundDiceContainer.innerHTML = '';
            hitSummary.innerText = '';
            woundSummary.innerText = '';
            woundTargetText.innerText = '';
        });

        // Effect: Warp Particles
        function spawnParticles() {
            const app = document.getElementById('app-container');
            for(let i=0; i<10; i++) {
                const p = document.createElement('div');
                p.classList.add('warp-particle');
                p.style.width = `${Math.random() * 20 + 10}px`;
                p.style.height = p.style.width;
                p.style.left = `${Math.random() * 100}%`;
                p.style.bottom = `-20px`;
                p.style.background = Math.random() > 0.5 ? 'var(--fog-light-green)' : 'var(--ghost-green)';
                app.appendChild(p);
                setTimeout(() => p.remove(), 4000);
            }
        }
    </script>
</body>
</html>
